<header class="header">

<img src="icono.png" class="logo">

<h1>TAREA FACIL</h1>
<p>Administrador de Tareas ADSO</p>

</header>

<div class="contenedor">

<div class="usuarios">

@for (usuario of usuarios; track usuario.id){

<app-usuario
[usuario]="usuario"
[seleccionado]="usuarioSeleccionado?.id === usuario.id"
(seleccionar)="seleccionarUsuario($event)">
</app-usuario>

}

</div>

<div class="contenido">

<img [src]="usuarioSeleccionado?.avatar" class="avatar-grande">

<h1>{{usuarioSeleccionado?.nombre}}</h1>

<app-tareas
[tareas]="usuarioSeleccionado?.tareas">
</app-tareas>

</div>

</div>
