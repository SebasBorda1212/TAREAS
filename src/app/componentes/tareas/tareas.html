<button class="btn-agregar" (click)="abrirModal()">
Agregar Tarea Nueva
</button>

<div class="lista-tareas">

@for (tarea of tareas; track tarea){

@if(!tarea.completado){

<div class="tarea-card">

<h3>{{tarea.titulo}}</h3>

<span class="fecha">{{tarea.fecha}}</span>

<p class="descripcion">
{{tarea.descripcion}}
</p>

<div class="acciones">
<button (click)="terminarTarea(tarea)">
Terminada
</button>
</div>

</div>

}

}

</div>


@if(mostrarModal){

<div class="overlay" (click)="cerrarModal()">

<div class="modal" (click)="$event.stopPropagation()">

<h2>Nueva Tarea</h2>

<input
type="text"
placeholder="Título"
[(ngModel)]="titulo">

<input
type="date"
[(ngModel)]="fecha">

<textarea
placeholder="Descripción"
[(ngModel)]="descripcion">
</textarea>

<div class="botones">

<button (click)="agregarTarea()">
Guardar
</button>

<button (click)="cerrarModal()">
Cancelar
</button>

</div>

</div>

</div>

}
