<div class="formulario">

<input
type="text"
placeholder="Título de la tarea"
[(ngModel)]="titulo">

<input
type="date"
[(ngModel)]="fecha">

<textarea
placeholder="Descripción de la tarea"
[(ngModel)]="descripcion">
</textarea>

<button (click)="agregarTarea()">
Agregar Tarea Nueva
</button>

</div>


<div class="tareas-container">

@for (tarea of tareas; track tarea){

@if(!tarea.completado){

<div class="tarea-card">

<h3>{{tarea.titulo}}</h3>

<span class="fecha">{{tarea.fecha}}</span>

<p class="descripcion">
{{tarea.descripcion}}
</p>

<div class="acciones">

<button (click)="terminarTarea(tarea)">
Terminada
</button>

</div>

</div>

}

}

</div>
